<!DOCTYPE html>
<html>
<head>
<title>jQuery Simple Example</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
body {
font-family: Arial;
background: #f4f7f6;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}
.container {
background: white;
padding: 20px;
text-align: center;
border-radius: 10px;
box-shadow: 0 0 10px #ccc;
}
#list li {
background: #e8f0fe;
margin: 5px;
padding: 8px;
border-radius: 5px;
}
.box {
width: 100px;
height: 100px;
background: blue;
color: white;
margin: 20px auto;
line-height: 100px;
border-radius: 5px;
}
button {
padding: 10px 20px;
margin: 5px;
background: #007bff;
color: white;
border: none;
border-radius: 5px;
cursor: pointer;
}
</style>
</head>
<body>
<div class="container">
<p id="paragraph">This is an existing paragraph.</p>
<ul id="list">
<li>List item 1</li>
<li>List item 2</li>
</ul>
<div id="box" class="box">Animate me!</div>
<button id="appendButton">Append Content</button>
<button id="animateButton">Animate Box</button>
</div>
<script>
$(document).ready(function () {
// Append text and list item
$("#appendButton").click(function () {
$("#paragraph").append(" Appended text.");
$("#list").append("<li>New appended list item</li>");
});
// Animate box
$("#animateButton").click(function () {
$("#box").animate({
width: "200px",
height: "200px",
opacity: 0.5
}, 1000, function () {
$(this).css("background-color", "green");
});
});
});
</script>
</body>
</html>
