<!DOCTYPE html>
<html>
<head>
<title>Simple Converter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
.header{background:black;color:white;text-align:center;padding:15px;}
.box{
background:white;width:85%;margin:20px auto;padding:20px;
border:1px solid #ccc;border-radius:8px;
}
textarea,input{
width:100%;padding:10px;border:1px solid #999;
border-radius:5px;margin-top:10px;
}
button{
background:#007BFF;color:white;border:none;
padding:10px 20px;margin-top:10px;border-radius:5px;
}
pre{
background:#eee;padding:10px;border-radius:5px;margin-top:10px;
white-space:pre-wrap;
}
</style>
</head>
<body>
<div class="header">Simple Converter</div>
<div class="box">
<h3>1. Convert JSON Text to JavaScript Object</h3>
<textarea id="jsonInput"></textarea>
<button onclick="jToObj()">ConvertJSON</button>
<pre id="jsonOutput"></pre>
</div>
<div class="box">
<h3>2. Convert JSON Results into Date</h3>
<textarea id="jsonDateInput"></textarea>
<button onclick="jToDate()">Convertto Date</button>
<pre id="jsonDateOutput"></pre>
</div>
<div class="box">
<h3>3. Convert JSON to CSV and CSV to JSON</h3>
<textarea id="jsonCsvInput"></textarea>
<button onclick="jToCsv()">JSONto CSV</button>
<pre id="csvOutput"></pre>
<textarea id="csvInput" style="margin-top:15px;"></textarea>
<button onclick="csvToJson()">CSVto JSON</button>
<pre id="jsonCsvOutput"></pre>
</div>
<div class="box">
<h3>4. Create Hash from String</h3>
<input id="hashInput">
<button onclick="makeHash()">Create Hash</button>
<pre id="hashOutput"></pre>
</div>
<script>
function jToObj(){
try{jsonOutput.textContent=
JSON.stringify(JSON.parse(jsonInput.value),null,2);}
catch{jsonOutput.textContent="Invalid JSON";}
}
function jToDate(){
try{
let d=new Date(JSON.parse(jsonDateInput.value).date);
jsonDateOutput.textContent=isNaN(d)?"Invalid Date":d.toString();
}catch{jsonDateOutput.textContent="Invalid JSON";}
}
function jToCsv(){
    try{
let arr=JSON.parse(jsonCsvInput.value);
let k=Object.keys(arr[0]);
let csv=k.join(",")+"\n";
arr.forEach(o=>csv+=k.map(x=>JSON.stringify(o[x])).join(",")+"\n");
csvOutput.textContent=csv;
}catch{csvOutput.textContent="Invalid JSON";}
}
function csvToJson(){
try{
let l=csvInput.value.trim().split("\n");
let k=l[0].split(",");
let out=[];
for(let i=1;i<l.length;i++){
let v=l[i].split(",");
let o={};k.forEach((x,j)=>o[x]=v[j]);
out.push(o);
}
jsonCsvOutput.textContent=JSON.stringify(out,null,2);
}catch{jsonCsvOutput.textContent="Invalid CSV";}
}
function makeHash(){
hashOutput.textContent=CryptoJS.SHA256(hashInput.value).toString();
}
</script>
</body>
</html>
